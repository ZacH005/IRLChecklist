<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
    <script>
      const repositoryBasePath = '/IRLChecklist/';
      const { pathname, search, hash } = window.location;
      const redirectTarget = `${repositoryBasePath}${search}${hash}`;

      if (pathname !== repositoryBasePath) {
        window.location.replace(redirectTarget);
      }
    </script>
  </head>
  <body></body>
</html>
